
        
          <tr>
            <th scope="row">1</th>
            <td height="50">
                {% if instance.photo %} 
                <a href="{{ instance.get_absolute_url }}"><img class="card-img-top" height="50" src="{{ instance.photo.url }}" alt="{{ instance.model }} logo"></a>

            <td>{{ instance.name }}</td>

          </tr>
