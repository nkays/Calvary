    <div class="row justify-content-center"> 
        {% for obj in location_list %}
        <div class="col-2"> 
            {% if obj.photo %}
                <img src="{{ obj.photo.url }}" 
                    class="bd-placeholder-img rounded-circle" 
                    alt="{{ obj.name }}" 
                    width="140" 
                    height="140">
                {% else %}
                    <!-- Keep a fallback placeholder if no photo is uploaded -->
                    <svg aria-label="Placeholder" 
                        class="bd-placeholder-img rounded-circle" 
                        height="140" 
                        preserveAspectRatio="xMidYMid slice" 
                        role="img" 
                        width="140" 
                        xmlns="http://www.w3.org/2000/svg">
                        <title>No photo available</title>
                        <rect width="100%" height="100%" fill="var(--bs-secondary-color)"></rect>
                    </svg>
                {% endif %}
            <h2 class="fw-normal">{{ obj.title }}</h2> 
            <p>
                {{ obj.address }}
            </p> 
            <p>
                <a class="btn btn-secondary" href="#">View details »</a>
            </p> 
        </div>
        <div class="col-1"></div>
        {% endfor %}
    </div>

    
{% endblock %}
